name: iOS Build (No Code Signing)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Download AI Model from Google Drive
        run: |
          pip install gdown
          mkdir -p assets
          # Download everything in the shared folder
          gdown --folder https://drive.google.com/drive/folders/1ckcbCzW7XG0PFnnuRFIiICoAsPML9ujH
          # Move the downloaded .bin file into the actual assets/ location
          find . -name "*.bin" -exec mv {} assets/gemma-2b-it-gpu-int4.bin \;

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Force iOS 14 Deployment Target
        run: |
          sed -i '' "s/^# platform :ios.*/platform :ios, '14.0'/g" ios/Podfile || true
          sed -i '' "s/platform :ios.*/platform :ios, '14.0'/g" ios/Podfile || true
          
      - name: Build iOS App without Signing
        run: flutter build ios --release --no-codesign

      - name: Package to IPA
        run: |
          mkdir -p build/ios/iphoneos/Payload
          mv build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/
          cd build/ios/iphoneos
          zip -qq -r MoneyTrace.ipa Payload
          cd ../../..

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MoneyTrace-iOS-IPA
          path: build/ios/iphoneos/MoneyTrace.ipa
